<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración · STEM-Trust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
    <!-- Header y navegación (igual) -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">...</header>
    <nav class="bg-white border-b border-gray-200">...</nav>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
            <h2 class="text-xl font-bold text-gray-800 mb-5">Configuración de la cuenta</h2>
            
            <!-- perfil -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Nombre completo</label>
                    <input type="text" value="María Gómez" class="w-full border border-gray-200 rounded-xl p-3">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Correo</label>
                    <input type="email" value="maria.g@ejemplo.com" class="w-full border border-gray-200 rounded-xl p-3">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Teléfono</label>
                    <input type="text" value="+51 987 654 321" class="w-full border border-gray-200 rounded-xl p-3">
                </div>
            </div>

            <!-- preferencias -->
            <div class="mt-8 pt-5 border-t border-gray-200">
                <h3 class="font-semibold text-gray-800 mb-3">Notificaciones</h3>
                <div class="space-y-2">
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" checked> Recordatorios de aporte</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" checked> Validación OCR exitosa</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox"> Resumen semanal del grupo</label>
                </div>
            </div>

            <!-- Smart Rules -->
            <div class="mt-8 pt-5 border-t border-gray-200">
                <h3 class="font-semibold text-gray-800 mb-3">Smart Rules y grupo</h3>
                <ul class="text-xs text-gray-600 list-disc list-inside bg-gray-50 p-3 rounded-lg">
                    <li>Cumplir con el aporte mínimo antes de cada cierre.</li>
                    <li>Si el grupo no completa la meta, los fondos se devuelven (netos de comisión 0%).</li>
                    <li>Scoring de comportamiento basado en puntualidad y cursos STEM.</li>
                </ul>
            </div>

            <div class="mt-8 flex gap-3">
                <a href="profile.html" class="flex-1 border border-gray-300 text-gray-700 px-6 py-2 rounded-xl text-center hover:bg-gray-50">Cancelar</a>
                <button class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl">Guardar cambios</button>
            </div>
        </div>
    </main>
</body>
</html>
