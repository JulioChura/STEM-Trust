<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil · STEM-Trust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
    <!-- Header (igual) -->

    <main class="max-w-3xl mx-auto px-4 py-8">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <!-- Cabecera del perfil -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-8 text-white text-center">
                <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600 text-3xl font-bold">
                    MG
                </div>
                <h1 class="text-2xl font-bold">María Gómez</h1>
                <p class="text-indigo-100">maria.gomez@email.com · Miembro desde 2024</p>
            </div>

            <!-- Información del perfil -->
            <div class="p-6">
                <!-- Estadísticas -->
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="text-center">
                        <span class="text-2xl font-bold text-indigo-600">7</span>
                        <p class="text-xs text-gray-500">Aportes</p>
                    </div>
                    <div class="text-center">
                        <span class="text-2xl font-bold text-indigo-600">2</span>
                        <p class="text-xs text-gray-500">Grupos</p>
                    </div>
                    <div class="text-center">
                        <span class="text-2xl font-bold text-indigo-600">780</span>
                        <p class="text-xs text-gray-500">Scoring</p>
                    </div>
                </div>

                <!-- Datos personales -->
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Nombre completo</label>
                        <p class="font-medium">María Gómez Rodríguez</p>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Correo electrónico</label>
                        <p class="font-medium">maria.gomez@email.com</p>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Teléfono</label>
                        <p class="font-medium">+51 987 654 321</p>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">Intereses STEM</label>
                        <div class="flex flex-wrap gap-2">
                            <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm">Programación</span>
                            <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm">Data Science</span>
                            <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm">Robótica</span>
                        </div>
                    </div>
                </div>

                <!-- Botones de acción -->
                <div class="flex gap-3">
                    <a href="settings.html" class="flex-1 bg-indigo-600 text-white text-center py-3 rounded-xl hover:bg-indigo-700 font-medium">
                        Editar perfil
                    </a>
                    <a href="documents.html" class="flex-1 border border-indigo-600 text-indigo-600 text-center py-3 rounded-xl hover:bg-indigo-50 font-medium">
                        Ver documentos
                    </a>

            </div>
        </div>
