<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro · STEM-Trust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 font-sans antialiased flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-2xl">
        <!-- Logo -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-lg mb-4">
                <i class="fas fa-shield-halved text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Únete a STEM‑Trust</h1>
            <p class="text-gray-500 mt-1">Comienza a construir tu historial financiero</p>
        </div>

        <!-- Tarjeta de registro -->
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-8 border border-white/50">
            <!-- Tipo de usuario -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-3">¿Cómo quieres participar?</label>
                <div class="grid grid-cols-2 gap-4">
                    <a href="dashboard.html?type=user" class="border border-gray-200 rounded-xl p-4 flex items-center gap-3 cursor-pointer hover:border-indigo-300 hover:bg-indigo-50 transition">
                        <div>
                            <span class="font-medium text-gray-800 block">Usuario</span>
                            <p class="text-xs text-gray-500">Únete a grupos existentes</p>
                        </div>
                    </a>
                    <a href="organizer-panel.html?type=organizer" class="border border-gray-200 rounded-xl p-4 flex items-center gap-3 cursor-pointer hover:border-indigo-300 hover:bg-indigo-50 transition">
                        <div>
                            <span class="font-medium text-gray-800 block">Organizadora</span>
                            <p class="text-xs text-gray-500">Crea y gestiona grupos</p>
                        </div>
                    </a>
                </div>
            </div>

            <!-- Datos básicos -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Nombre</label>
                    <input type="text" placeholder="María" value="María" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Apellido</label>
                    <input type="text" placeholder="Gómez" value="Gómez" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-400">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-1">Correo electrónico</label>
                <input type="email" placeholder="maria@ejemplo.com" value="maria@ejemplo.com" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-400">
            </div>

            <!-- Encuesta de intereses (para recomendaciones por IA) -->
            <div class="mb-6 p-5 bg-indigo-50/50 rounded-xl border border-indigo-100">
                <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
                    <i class="fas fa-robot text-indigo-600"></i>
                    Personalización con IA
                </h3>
                <p class="text-xs text-gray-500 mb-4">Selecciona tus intereses para recibir recomendaciones inteligentes</p>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">Áreas de interés STEM</label>
                        <div class="flex flex-wrap gap-2">
                            <label class="flex items-center gap-1 bg-white px-3 py-2 rounded-lg border text-sm"><input type="checkbox" checked> Programación</label>
                            <label class="flex items-center gap-1 bg-white px-3 py-2 rounded-lg border text-sm"><input type="checkbox"> Robótica</label>
                            <label class="flex items-center gap-1 bg-white px-3 py-2 rounded-lg border text-sm"><input type="checkbox" checked> Data Science</label>
                            <label class="flex items-center gap-1 bg-white px-3 py-2 rounded-lg border text-sm"><input type="checkbox"> Hardware</label>
                            <label class="flex items-center gap-1 bg-white px-3 py-2 rounded-lg border text-sm"><input type="checkbox"> Biotecnología</label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-2">Tipo de activo deseado</label>
                        <select class="w-full px-4 py-2 border border-gray-200 rounded-lg text-sm">
                            <option selected>Laptop/Computadora</option>
                            <option>Kit de robótica</option>
                            <option>Impresora 3D</option>
                            <option>Tablet</option>
                            <option>Instrumentos de laboratorio</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-1">Contraseña</label>
                <input type="password" placeholder="••••••••" value="password123" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:border-indigo-400">
            </div>

            <div class="flex gap-3">
                <a href="login.html" class="flex-1 border border-gray-300 text-gray-700 py-3 rounded-xl text-center hover:bg-gray-50">Cancelar</a>
                <a href="dashboard.html" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-center">Crear cuenta</a>
            </div>

            <p class="text-center text-gray-500 text-sm mt-6">
                ¿Ya tienes cuenta? 
                <a href="login.html" class="text-indigo-600 font-medium hover:underline">Inicia sesión</a>
            </p>
        </div>
    </div>
</body>
</html>
